name: Frontend Lint Pipeline

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: mongolyy/reviewdog-action-biome@v2.11.0
        with:
          workdir: 'frontend'
          reporter: github-pr-review
          fail_level: any
          filter_mode: file
